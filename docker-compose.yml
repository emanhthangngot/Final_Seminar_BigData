version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: seminar_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - seminar_net
    deploy:
      resources:
        limits:
          memory: 1G

  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: seminar_weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
    volumes:
      - ./weaviate_data:/var/lib/weaviate
    networks:
      - seminar_net
    deploy:
      resources:
        limits:
          memory: 1G

  milvus-standalone:
    image: milvusdb/milvus:latest
    container_name: seminar_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./milvus_data:/var/lib/milvus
    networks:
      - seminar_net
    depends_on:
      - etcd
      - minio
    deploy:
      resources:
        limits:
          memory: 2G

  etcd:
    container_name: seminar_milvus_etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - seminar_net

  minio:
    container_name: seminar_milvus_minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - seminar_net

  ollama:
    image: ollama/ollama:latest
    container_name: seminar_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - seminar_net
    # For GPU support (optional but recommended if available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  seminar_net:
    driver: bridge
